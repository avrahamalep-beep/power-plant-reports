# Render Blueprint — si el deploy falla, renombra este archivo a render.yaml.off
# y configura Build/Start solo en el panel de Render.
services:
  - type: web
    name: power-plant-reports
    runtime: node
    plan: free
    region: oregon
    branch: main
    # Node 20 + npm moderno: evita fallo con package-lock.json v3
    buildCommand: npm install --no-audit --no-fund
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20.18.1"
