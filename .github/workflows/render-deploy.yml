# Optional: GitHub secret RENDER_DEPLOY_HOOK_URL = URL from Render → Settings → Deploy Hook
name: Trigger Render deploy
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: POST deploy hook
        env:
          HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -n "$HOOK" ]; then
            curl -fsS -X POST "$HOOK"
            echo "Deploy hook OK"
          else
            echo "No RENDER_DEPLOY_HOOK_URL secret — skipping (Render still auto-deploys if repo is connected)"
          fi
